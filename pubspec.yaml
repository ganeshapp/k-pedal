name: k_pedal
description: "K-Pedal: Korea Cycling Passport"
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Maps
  flutter_map: ^7.0.2

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Open external apps (Kakao Maps, Naver Maps, phone)
  url_launcher: ^6.3.1

  # State management
  provider: ^6.1.2

  # Utilities
  latlong2: ^0.9.1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/data/paths.json

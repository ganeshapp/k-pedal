name: k_pedal
description: "K-Pedal: Korea Cycling Passport"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Maps
  flutter_map: ^7.0.2
  flutter_map_tile_caching: ^9.1.4

  # Location
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Strava integration
  url_launcher: ^6.3.1

  # State management
  provider: ^6.1.2

  # Utilities
  latlong2: ^0.9.1
  cached_network_image: ^3.4.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/data/paths.json
